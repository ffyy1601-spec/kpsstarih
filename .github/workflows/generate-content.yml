name: Generate Daily Content

on:
  schedule:
    - cron: '0 */6 * * *'   # Her 6 saatte bir (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # Manuel tetikleme

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate new article with Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-content.mjs

      - name: Regenerate static pages and sitemap
        run: node scripts/generate-pages.mjs

      - name: Ping Google with updated sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://kpsstarih.com.tr/sitemap.xml"
          echo "Google sitemap ping sent."

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Otomatik içerik: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi
