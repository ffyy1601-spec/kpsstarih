<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                      "secondary-container": "#a4d8ff",
                      "tertiary-fixed": "#f8a010",
                      "on-primary": "#f8f0ff",
                      "tertiary-container": "#f8a010",
                      "on-tertiary-fixed-variant": "#563400",
                      "on-surface": "#272e42",
                      "tertiary-fixed-dim": "#e79400",
                      "on-primary-fixed": "#000000",
                      "on-secondary": "#e9f4ff",

                      "on-error-container": "#510017",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-background {
            background: radial-gradient(circle at 0% 0%, rgba(112, 42, 225, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(0, 98, 140, 0.08) 0%, transparent 50%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface overflow-x-hidden min-h-screen">
<!-- TopAppBar Suppressed for Landing Screen following JSON shell visibility rules -->
<main class="relative min-h-screen flex flex-col items-center justify-center px-6 glass-background">
<!-- Background Energy Blobs -->
<div class="absolute top-1/4 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 -right-24 w-64 h-64 bg-secondary/10 rounded-full blur-[100px]"></div>
<div class="relative z-10 w-full max-w-3xl flex flex-col items-center text-center">
<!-- Icon/Hero Section -->
<div class="mb-10 relative">
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full scale-150"></div>
<div class="relative w-32 h-32 md:w-40 md:h-40 bg-surface-container-lowest rounded-3xl flex items-center justify-center shadow-[0_20px_50px_rgba(112,42,225,0.12)]">
<span class="material-symbols-outlined text-primary text-6xl md:text-7xl" data-icon="auto_stories" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
</div>
<!-- Headlines -->
<div class="space-y-4 mb-12">
<h1 class="text-4xl md:text-6xl font-headline font-extrabold tracking-tight text-on-background leading-tight">
                    KPSS Tarih <span class="text-primary">Soru Çözümü</span>
</h1>
<p class="text-lg md:text-xl text-on-surface-variant max-w-xl mx-auto font-medium">
                    Geçmişin bilgisiyle geleceğini inşa et. En güncel müfredatla hazırlanan binlerce soruyla sınav yolculuğunda yanındayız.
                </p>
</div>
<!-- Action Cluster -->
<div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto mb-20">
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-10 py-5 rounded-xl font-headline font-bold text-lg shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="rocket_launch" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
                    Teste Başla
                </button>
<button class="bg-surface-container-low border-2 border-outline-variant/10 text-primary px-10 py-5 rounded-xl font-headline font-bold text-lg hover:bg-surface-container-high transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="menu_book" style="font-variation-settings: 'FILL' 0;">menu_book</span>
                    Konuları İncele
                </button>
</div>
<!-- Stats Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
<!-- Card 1 -->
<div class="bg-surface-container-lowest p-6 rounded-2xl flex flex-col items-center justify-center space-y-2 border-b-4 border-primary/20">
<div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary" data-icon="quiz" style="font-variation-settings: 'FILL' 1;">quiz</span>
</div>
<span class="text-2xl font-label font-extrabold text-on-background">5.000+ Soru</span>
<span class="text-sm font-label font-bold text-outline uppercase tracking-wider">Kapsamlı Arşiv</span>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest p-6 rounded-2xl flex flex-col items-center justify-center space-y-2 border-b-4 border-secondary/20">
<div class="w-12 h-12 bg-secondary/10 rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-secondary" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<span class="text-2xl font-label font-extrabold text-on-background">24/7 Erişim</span>
<span class="text-sm font-label font-bold text-outline uppercase tracking-wider">Her An Yanında</span>
</div>
<!-- Card 3 -->
<div class="bg-surface-container-lowest p-6 rounded-2xl flex flex-col items-center justify-center space-y-2 border-b-4 border-tertiary-container/20">
<div class="w-12 h-12 bg-tertiary-container/10 rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-tertiary" data-icon="military_tech" style="font-variation-settings: 'FILL' 1;">military_tech</span>
</div>
<span class="text-2xl font-label font-extrabold text-on-background">%98 Başarı</span>
<span class="text-sm font-label font-bold text-outline uppercase tracking-wider">Sınav Odaklı</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Suppression Check: Page is Transactional/Welcome, hide Shell per instructions -->
</body></html>
